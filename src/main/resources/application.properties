# ================================
# Application Name
# ================================
spring.application.name=spring-ai-vector-store-api-basics
# This sets the name of the Spring Boot application.
# Useful for logging, monitoring, or when running multiple services.

# ================================
# 1. Google Gemini Config
# ================================
spring.ai.model.chat=google-genai
# Tells Spring AI to use Google Gemini as the chat model.

# API Key for Google Gemini (GenAI).
# You should set GEMINI_API_KEY as an environment variable for security.
# Here "AI" is just a placeholder ? replace it with your actual key.
spring.ai.google.genai.api-key=AI

# Chat model configuration.
# "gemini-2.5-flash" is a fast, lightweight version of Gemini optimized for speed.
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Embedding model configuration.
# Embeddings convert text into numerical vectors for similarity search.
# "text-embedding-004" is a Google Gemini embedding model.
# Here "AI" is just a placeholder ? replace it with your actual key.
spring.ai.google.genai.embedding.api-key=AI
spring.ai.google.genai.embedding.text.options.model=text-embedding-004

# ================================
# 2. Aiven PostgreSQL Connection
# ================================
spring.datasource.url=jdbc:postgresql
# JDBC connection string for PostgreSQL database.
# "jdbc:postgresql" ensures the correct driver is used.

spring.datasource.username=avnadmin
# Database username (provided by Aiven).

spring.datasource.password=AV
# Database password (provided by Aiven).

# Explicitly specify the PostgreSQL driver class.
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings:
spring.jpa.hibernate.ddl-auto=update
# Automatically updates the database schema based on entity classes.
# Options: none, validate, update, create, create-drop.

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Tells Hibernate to use PostgreSQL-specific SQL dialect.

# ================================
# 3. Vector Store Settings
# ================================
spring.ai.vectorstore.pgvector.initialize-schema=true
# Automatically creates the schema for pgvector if it doesn?t exist.

spring.ai.vectorstore.pgvector.dimensions=768
# Defines the embedding vector size (768 dimensions).
# This must match the embedding model output size.

spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# Defines how similarity is calculated between vectors.
# COSINE_DISTANCE ? measures angle similarity (common for embeddings).